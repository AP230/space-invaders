<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>SPACE INVADERS</h1>
        </div>

        <div class="game-wrapper">
            <div class="top-bar">
                <div class="score-box">
                    <span>SCORE</span>
                    <strong id="score">0</strong>
                </div>
                <div class="wave-box">
                    <span>WAVE</span>
                    <strong id="wave">1</strong>
                </div>
                <div class="lives-box">
                    <span>LIVES</span>
                    <strong id="lives">3</strong>
                </div>
            </div>

            <div class="game-board" id="gameBoard">
                <div class="stars"></div>
                <div class="enemies-grid" id="enemiesGrid"></div>
                <div class="shields-grid" id="shieldsGrid"></div>
                <div class="ufo hidden" id="ufo"></div>
                <div class="player" id="player"></div>
            </div>

            <div class="controls">
                <button class="btn-start" id="startBtn">START GAME</button>
                <button class="btn-pause" id="pauseBtn">PAUSE</button>
            </div>
        </div>

        <div class="footer">
            <p>Move with ← →, Shoot with SPACE, Pause with P</p>
        </div>
    </div>

    <div class="overlay hidden" id="overlay">
        <div class="overlay-content">
            <h2 id="overlayTitle">SPACE INVADERS</h2>
            <p id="overlayText">Destroy the alien fleet before they reach your base.</p>
            <button id="overlayBtn">PLAY</button>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
